    <path d="M280 96h34c10 0 18 8 18 18v192c0 10-8 18-18 18h-34c-10 0-18-8-18-18V114c0-10 8-18 18-18z" fill="url(#mbiBlue)"/>
    <path d="M428 100h30c10 0 18 8 18 18v184c0 10-8 18-18 18h-30c-10 0-18-8-18-18V118c0-10 8-18 18-18z" fill="url(#mbiBlue)"/>
    <rect x="335" y="92" width="56" height="56" rx="18" fill="#3f73ef"/>
