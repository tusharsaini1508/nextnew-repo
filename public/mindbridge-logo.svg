      <rect x="20" y="112" width="12" height="30" rx="6" fill="url(#mbiBlueSoft)"/>
      <rect x="0" y="20" width="30" height="12" rx="6" transform="rotate(-60 15 26)" fill="url(#mbiBlueSoft)"/>
      <rect x="0" y="112" width="30" height="12" rx="6" transform="rotate(60 15 118)" fill="url(#mbiBlueSoft)"/>
      <rect x="-30" y="56" width="30" height="12" rx="6" transform="rotate(18 0 62)" fill="url(#mbiBlueSoft)"/>
      <rect x="20" y="56" width="30" height="12" rx="6" transform="rotate(-18 35 62)" fill="url(#mbiBlueSoft)"/>
