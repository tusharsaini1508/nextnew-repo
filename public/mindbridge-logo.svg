      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.20 0 1 0 0 0.40 0 0 1 0 0.95 0 0 0 0.45 0"/>
    </filter>
  </defs>

  <rect width="1400" height="520" fill="none"/>

