<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">Mindbridge Innovations logo</title>
  <desc id="desc">Clean MBI logo with blue brand mark and Mindbridge Innovations wordmark</desc>
  <defs>
    <linearGradient id="mbiBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4b8bff"/>
      <stop offset="45%" stop-color="#2e66ea"/>
      <stop offset="100%" stop-color="#2048bf"/>
    </linearGradient>
    <linearGradient id="mbiBlueSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#88bbff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d7e7ff" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#14329a" flood-opacity="0.18"/>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
